# Run daily at 13:00 (1:00 PM) Vietnam (UTC+7) = 6:00 AM UTC
name: Daily news scan

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scan
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SA_JSON }}
        run: python run_scan.py
